- apiVersion: metallb.io/v1beta1
  kind: IPAddressPool
  metadata:
    name: svc-pool
    namespace: metallb-system
  spec:
    addresses:
      - 192.168.30.240-192.168.30.250
    autoAssign: true

- apiVersion: metallb.io/v1beta1
  kind: L2Advertisement
  metadata:
    name: svc-pool-l2
    namespace: metallb-system
  spec:
    ipAddressPools:
      - svc-pool
    serviceSelectors: []
